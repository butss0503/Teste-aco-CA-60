<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário de Testes - Aço CA 60</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="Grandeaco.png" alt="Logótipo Grande Aço" id="logo-empresa">
        
        <h1>Controle Diário de Testes - Aço CA 60</h1>
        <p>Registro individual de ensaios de tração (Bitolas 3.4 a 6.0 mm)</p>
    </header>

    <main>
        <section>
            <h2>Lançamento de Teste</h2>
            <form id="form-teste">
                
                <label for="data">Data do Teste:</label>
                <input type="date" id="data" name="data" required>

                <label for="operador">Nome do Operador:</label>
                <input type="text" id="operador" name="operador" placeholder="Ex: Flávio" required>

                <label for="bitola">Bitola (mm):</label>
                <select id="bitola" name="bitola" required>
                    <option value="">Selecione...</option>
                    <option value="3.4">3.4 mm</option>
                    <option value="3.8">3.8 mm</option>
                    <option value="4.2">4.2 mm</option>
                    <option value="4.5">4.5 mm</option>
                    <option value="5.0">5.0 mm</option>
                    <option value="6.0">6.0 mm</option>
                </select>

                <label for="status">Status do Teste:</label>
                <select id="status" name="status" required>
                    <option value="">Selecione...</option>
                    <option value="aprovado">Aprovado</option>
                    <option value="reprovado">Reprovado</option>
                </select>

                <div id="grupo-reprovacao" style="display: none;">
                    <label for="motivo-falha">Motivo da Reprovação:</label>
                    <select id="motivo-falha" name="motivo-falha">
                        <option value="">Selecione o motivo...</option>
                        <option value="escorregamento">Escorregamento na garra</option>
                        <option value="ruptura_solda">Ruptura na solda</option>
                        <option value="baixa_resistencia">Baixa resistência à tração</option>
                        <option value="outros">Outros</option>
                    </select>

                    <div id="grupo-outros" style="display: none;">
                        <label for="outro-motivo">Descreva o erro:</label>
                        <input type="text" id="outro-motivo" name="outro-motivo" placeholder="Descreva o que aconteceu">
                    </div>
                </div>

                <label for="anexo">Anexar Arquivo (Foto ou Relatório PDF):</label>
                <input type="file" id="anexo" name="anexo" accept="image/*, .pdf">

                <button type="submit">Registrar Teste</button>
            </form>
        </section>

        <hr>

        <section>
            <h2>Resumo Diário</h2>
            
            <div id="area-filtro">
                <label for="filtro-data">Pesquisar Dia:</label>
                <input type="date" id="filtro-data">
                <button type="button" id="btn-limpar-filtro">Mostrar Todos</button>
            </div>

            <div id="lista-resultados">
                <p>Carregando testes da nuvem...</p>
            </div>
        </section>
    </main>

    <script>
        const statusSelect = document.getElementById('status');
        const grupoReprovacao = document.getElementById('grupo-reprovacao');
        const motivoFalhaSelect = document.getElementById('motivo-falha');
        const grupoOutros = document.getElementById('grupo-outros');
        const outroMotivoInput = document.getElementById('outro-motivo');
        const formTeste = document.getElementById('form-teste');
        const listaResultados = document.getElementById('lista-resultados');
        const filtroDataInput = document.getElementById('filtro-data');
        const btnLimparFiltro = document.getElementById('btn-limpar-filtro');

        // Seu link oficial conectado à nuvem
        const LINK_PLANILHA = "https://script.google.com/macros/s/AKfycbwmKocpEDyZZsbpxiemeNORc790IB2wNBQM80dOI3WhDJu9LM9ywNRdx-iq2mRAip1juA/exec";

        let historicoTestes = [];

        // 1. Mostrar/esconder campos de erro dinamicamente
        statusSelect.addEventListener('change', function() {
            if (this.value === 'reprovado') {
                grupoReprovacao.style.display = 'block';
                motivoFalhaSelect.required = true;
            } else {
                grupoReprovacao.style.display = 'none';
                motivoFalhaSelect.required = false;
                motivoFalhaSelect.value = '';
                grupoOutros.style.display = 'none';
                outroMotivoInput.required = false;
                outroMotivoInput.value = '';
            }
        });

        motivoFalhaSelect.addEventListener('change', function() {
            if (this.value === 'outros') {
                grupoOutros.style.display = 'block';
                outroMotivoInput.required = true;
            } else {
                grupoOutros.style.display = 'none';
                outroMotivoInput.required = false;
                outroMotivoInput.value = '';
            }
        });

        // 2. Buscar dados salvos na Planilha do Google
        function carregarDadosDaPlanilha() {
            listaResultados.innerHTML = '<p>Carregando testes da nuvem...</p>';
            fetch(LINK_PLANILHA)
                .then(resposta => resposta.json())
                .then(dados => {
                    historicoTestes = dados;
                    atualizarTela();
                })
                .catch(erro => {
                    listaResultados.innerHTML = '<p>Erro ao carregar dados. Verifique a conexão.</p>';
                    console.error(erro);
                });
        }

        // 3. Renderizar (desenhar) os testes agrupados por dia na tela
        function atualizarTela() {
            listaResultados.innerHTML = ''; 
            let testesParaMostrar = historicoTestes;

            if (filtroDataInput.value) {
                const dataPesquisada = filtroDataInput.value.split('-').reverse().join('/');
                testesParaMostrar = historicoTestes.filter(teste => teste.dataFormatada === dataPesquisada);
            }

            if (testesParaMostrar.length === 0) {
                listaResultados.innerHTML = '<p>Nenhum teste encontrado.</p>';
                return;
            }

            const testesPorDia = {};
            
            // Organiza do mais novo para o mais antigo
            [...testesParaMostrar].reverse().forEach(teste => {
                if (!testesPorDia[teste.dataFormatada]) {
                    testesPorDia[teste.dataFormatada] = [];
                }
                testesPorDia[teste.dataFormatada].push(teste);
            });

            for (const data in testesPorDia) {
                const tituloDia = document.createElement('div');
                tituloDia.classList.add('separador-dia');
                tituloDia.innerHTML = `📅 Testes do dia: ${data}`;
                listaResultados.appendChild(tituloDia);

                testesPorDia[data].forEach(teste => {
                    const item = document.createElement('div');
                    item.classList.add('item-resultado');
                    item.classList.add(teste.status === 'aprovado' ? 'resultado-aprovado' : 'resultado-reprovado');

                    let textoMotivoFinal = (teste.textoMotivo && teste.textoMotivo !== "Nenhum") ? `<br><strong>Motivo:</strong> ${teste.textoMotivo}` : "";

                    item.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px;">
                            <div>
                                <strong>Bitola:</strong> ${teste.bitola}mm | <strong>Status:</strong> <span style="text-transform: uppercase;">${teste.status}</span>
                                ${textoMotivoFinal}
                            </div>
                            <button onclick="deletarTeste(${teste.linha})" style="background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;">Excluir</button>
                        </div>
                        <div style="font-size: 12px; color: #64748b;">
                            <strong>Operador:</strong> ${teste.operador} | <strong>Arquivo:</strong> ${teste.nomeArquivo}
                        </div>
                    `;
                    listaResultados.appendChild(item);
                });
            }
        }

        // 4. Função para acionar a exclusão de uma linha na planilha
        function deletarTeste(linha) {
            if(!confirm("Tem certeza que deseja excluir este teste?")) return;

            listaResultados.innerHTML = '<p>Excluindo teste da nuvem...</p>';

            fetch(LINK_PLANILHA, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ acao: "deletar", linha: linha })
            })
            .then(() => {
                alert("Teste excluído com sucesso!");
                carregarDadosDaPlanilha();
            })
            .catch(erro => {
                alert("Erro ao excluir o teste.");
                carregarDadosDaPlanilha();
            });
        }

        // Inicializa a listagem ao abrir a página
        carregarDadosDaPlanilha();

        filtroDataInput.addEventListener('change', atualizarTela);
        btnLimparFiltro.addEventListener('click', function() {
            filtroDataInput.value = '';
            atualizarTela();
        });

        // 5. Salvar um novo teste na planilha
        formTeste.addEventListener('submit', function(event) {
            event.preventDefault();

            const botaoSubmit = formTeste.querySelector('button[type="submit"]');
            botaoSubmit.disabled = true;
            botaoSubmit.innerText = "Enviando...";

            const data = document.getElementById('data').value;
            const operador = document.getElementById('operador').value;
            const bitola = document.getElementById('bitola').value;
            const status = statusSelect.value;
            const anexoInput = document.getElementById('anexo');
            
            let nomeArquivo = "Nenhum anexo";
            if(anexoInput.files.length > 0) {
                nomeArquivo = anexoInput.files[0].name;
            }

            let motivoLimpo = "Nenhum";
            if (status === 'reprovado') {
                if (motivoFalhaSelect.value === 'outros') {
                    motivoLimpo = outroMotivoInput.value;
                } else {
                    motivoLimpo = motivoFalhaSelect.options[motivoFalhaSelect.selectedIndex].text;
                }
            }

            const dataFormatada = data.split('-').reverse().join('/');

            const novoTeste = {
                acao: "inserir",
                dataFormatada: dataFormatada,
                operador: operador,
                bitola: bitola,
                status: status,
                textoMotivo: motivoLimpo,
                nomeArquivo: nomeArquivo
            };

            fetch(LINK_PLANILHA, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(novoTeste)
            })
            .then(() => {
                alert("Teste registrado com sucesso!");
                botaoSubmit.disabled = false;
                botaoSubmit.innerText = "Registrar Teste";
                
                document.getElementById('bitola').value = '';
                statusSelect.value = '';
                anexoInput.value = '';
                statusSelect.dispatchEvent(new Event('change'));
                filtroDataInput.value = '';

                carregarDadosDaPlanilha();
            })
            .catch(erro => {
                alert("Erro ao salvar o teste.");
                botaoSubmit.disabled = false;
                botaoSubmit.innerText = "Registrar Teste";
            });
        });
    </script>
</body>
</html>
